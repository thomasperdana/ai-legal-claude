<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d68a"/>
      <stop offset="50%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#f0d68a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- Block letter "AI" - row 1 -->
  <g fill="url(#textGrad)">
    <!-- A -->
    <rect x="56" y="35" width="16" height="16" rx="2"/>
    <rect x="72" y="35" width="16" height="16" rx="2"/>
    <rect x="40" y="51" width="16" height="16" rx="2"/>
    <rect x="88" y="51" width="16" height="16" rx="2"/>
    <rect x="40" y="67" width="16" height="16" rx="2"/>
    <rect x="56" y="67" width="16" height="16" rx="2"/>
    <rect x="72" y="67" width="16" height="16" rx="2"/>
    <rect x="88" y="67" width="16" height="16" rx="2"/>
    <rect x="40" y="83" width="16" height="16" rx="2"/>
    <rect x="88" y="83" width="16" height="16" rx="2"/>
    <rect x="40" y="99" width="16" height="16" rx="2"/>
    <rect x="88" y="99" width="16" height="16" rx="2"/>

    <!-- I -->
    <rect x="115" y="35" width="16" height="16" rx="2"/>
    <rect x="131" y="35" width="16" height="16" rx="2"/>
    <rect x="147" y="35" width="16" height="16" rx="2"/>
    <rect x="163" y="35" width="16" height="16" rx="2"/>
    <rect x="131" y="51" width="16" height="16" rx="2"/>
    <rect x="147" y="51" width="16" height="16" rx="2"/>
    <rect x="131" y="67" width="16" height="16" rx="2"/>
    <rect x="147" y="67" width="16" height="16" rx="2"/>
    <rect x="131" y="83" width="16" height="16" rx="2"/>
    <rect x="147" y="83" width="16" height="16" rx="2"/>
    <rect x="115" y="99" width="16" height="16" rx="2"/>
    <rect x="131" y="99" width="16" height="16" rx="2"/>
    <rect x="147" y="99" width="16" height="16" rx="2"/>
    <rect x="163" y="99" width="16" height="16" rx="2"/>
  </g>

  <!-- Block letter "LAW" - row 2 -->
  <g fill="url(#textGrad)">
    <!-- L -->
    <rect x="40" y="130" width="16" height="16" rx="2"/>
    <rect x="40" y="146" width="16" height="16" rx="2"/>
    <rect x="40" y="162" width="16" height="16" rx="2"/>
    <rect x="40" y="178" width="16" height="16" rx="2"/>
    <rect x="40" y="194" width="16" height="16" rx="2"/>
    <rect x="56" y="194" width="16" height="16" rx="2"/>
    <rect x="72" y="194" width="16" height="16" rx="2"/>
    <rect x="88" y="194" width="16" height="16" rx="2"/>

    <!-- A -->
    <rect x="131" y="130" width="16" height="16" rx="2"/>
    <rect x="147" y="130" width="16" height="16" rx="2"/>
    <rect x="115" y="146" width="16" height="16" rx="2"/>
    <rect x="163" y="146" width="16" height="16" rx="2"/>
    <rect x="115" y="162" width="16" height="16" rx="2"/>
    <rect x="131" y="162" width="16" height="16" rx="2"/>
    <rect x="147" y="162" width="16" height="16" rx="2"/>
    <rect x="163" y="162" width="16" height="16" rx="2"/>
    <rect x="115" y="178" width="16" height="16" rx="2"/>
    <rect x="163" y="178" width="16" height="16" rx="2"/>
    <rect x="115" y="194" width="16" height="16" rx="2"/>
    <rect x="163" y="194" width="16" height="16" rx="2"/>

    <!-- W -->
    <rect x="190" y="130" width="16" height="16" rx="2"/>
    <rect x="254" y="130" width="16" height="16" rx="2"/>
    <rect x="190" y="146" width="16" height="16" rx="2"/>
    <rect x="254" y="146" width="16" height="16" rx="2"/>
    <rect x="190" y="162" width="16" height="16" rx="2"/>
    <rect x="222" y="162" width="16" height="16" rx="2"/>
    <rect x="254" y="162" width="16" height="16" rx="2"/>
    <rect x="190" y="178" width="16" height="16" rx="2"/>
    <rect x="206" y="178" width="16" height="16" rx="2"/>
    <rect x="238" y="178" width="16" height="16" rx="2"/>
    <rect x="254" y="178" width="16" height="16" rx="2"/>
    <rect x="190" y="194" width="16" height="16" rx="2"/>
