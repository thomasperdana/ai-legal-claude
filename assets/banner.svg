  <!-- "for Claude Code" line -->
  <text x="40" y="272" font-family="'Courier New', monospace" font-size="13" fill="#636e72" letter-spacing="0.5">for Claude Code</text>

  <!-- Vertical accent line separating left and right -->
  <rect x="480" y="40" width="2" height="230" fill="#8b6914" opacity="0.4" rx="1"/>

  <!-- Right side: Commands list -->
  <g font-family="'Courier New', monospace" font-size="14" text-anchor="end">
    <text x="855" y="60"><tspan fill="#d4a843">/review </tspan><tspan fill="#636e72">&lt;file&gt;</tspan></text>
    <text x="855" y="88"><tspan fill="#d4a843">/risks </tspan><tspan fill="#636e72">&lt;file&gt;</tspan></text>
    <text x="855" y="116"><tspan fill="#d4a843">/compare </tspan><tspan fill="#636e72">&lt;file1&gt; &lt;file2&gt;</tspan></text>
    <text x="855" y="144"><tspan fill="#d4a843">/negotiate </tspan><tspan fill="#636e72">&lt;file&gt;</tspan></text>
    <text x="855" y="172"><tspan fill="#d4a843">/nda </tspan><tspan fill="#636e72">&lt;description&gt;</tspan></text>
    <text x="855" y="200"><tspan fill="#d4a843">/compliance </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="228"><tspan fill="#d4a843">/report </tspan><tspan fill="#636e72">&lt;file&gt;</tspan></text>
    <text x="855" y="256"><tspan fill="#d4a843">/report-pdf</tspan></text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="295" width="900" height="25" fill="#8b6914" opacity="0.3"/>
  <text x="450" y="312" font-family="'Courier New', monospace" font-size="11" fill="#636e72" text-anchor="middle" letter-spacing="1">14 skills  ·  5 parallel agents  ·  contract templates  ·  PDF reports</text>
</svg>